plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.avinash.bmi_calculator"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = "27.0.12077973"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        applicationId = "com.avinash.bmi_calculator"
        minSdk = flutter.minSdkVersion
        targetSdk = 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // 16KB page size support (required by Play Store from Nov 2025 onwards)
        // This enables 16KB ELF alignment for native libraries
        externalNativeBuild {
            cmake {
                cppFlags "-D_FORCE_ALIGN_16K"
            }
        }
        ndk {
            // Target 64-bit ABIs only — required for 16KB page alignment
            abiFilters "arm64-v8a", "x86_64"
        }
    }

    // 16KB page size — align native .so files in the APK
    androidResources {
        noCompress "*.so"
    }

    packaging {
        jniLibs {
            // Use 16KB page-aligned packaging for shared libraries
            useLegacyPackaging = false
        }
    }

    buildTypes {
        release {
            // Signing with your configured keystore (do NOT modify)
            signingConfig = signingConfigs.debug
            minifyEnabled = false
            shrinkResources = false
        }
    }
}

flutter {
    source = "../.."
}
